# ob-yml-menu --terminal alacritty menu.yml > ./menu.xml
# reconfigure openbox
---
openbox_menu:
    - Drun Rofi: "rofi -show drun -theme-str 'element-icon {size: 16;}'"
    - Terminal: $terminal  # defaults to xterm.
    - File Manager: $terminal --class w_85 -e yazi
    - Web Search: search
    - Btop: $terminal --class w_max -e btop
    - separator:
    - Development:
        - Subl Txt: subl
        - Micro: $terminal --class w_max -e micro
        - Nvim: $terminal --class w_max -e nvim
    - Network:
        - Firefox:
        - Brave:
        - Qutebrowser:
        - separator:
        - Qbittorrent:
        - Filezilla:
    - Mail/Chat:
        - Telegram: telegram-desktop
        - Discord:
        - Keybase: keybase-gui
    - Office:
        - Obsidian:
        - Onlyoffice: onlyoffice-desktopeditors
    - Multimedia:
        - Audacity:
        - Smplayer:
        - Pavucontrol: pavucontrol-qt
        - OBS: obs
    - Tools:
        - Thunar:
        - File-roller:
        - Galculator:
        - Xreader:
        - Catfish:
        - separator:
        - Virtualbox:
        - Veracrypt:
        - Gufw:
    - Settings:
        - Lxappearance:
        - Qt5ct:
        - Qt6ct:
        - Kvantummanager:
        - Tint2conf:
        - Power manager: xfce4-power-manager-settings
    - System:
        - Gparted:
        - Bleachbit:
        - Bleachbit(Root): pkexec bleachbit
        - Timeshift: timeshift-gtk
        - separator:
        - Openbox:
            - Reconfigure (W-A-r): openbox --reconfigure
            - Restart: openbox --restart
    - separator:
    - Lock: ~/.bin/multilock.sh -l dimblur
    - Logout: ~/.bin/rofi-logout
    # - Pipemenus:
        # - Remote Hosts: |
            # ~/bin/bl-sshconfig-pipemenu